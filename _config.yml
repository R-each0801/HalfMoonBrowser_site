title: HalfMoon Browser
description: iPhone 向けの片手操作ブラウザ — ダイヤル操作・広告ブロック・プライベートモードを搭載
lang: ja

# ⚠️ GitHub Pages で project site として公開するため baseurl 必須。
# https://r-each0801.github.io/HalfMoonBrowser_site/ で配信される。
# baseurl を空にすると CSS/画像のパスが全て 404 になる。
url: "https://r-each0801.github.io"
baseurl: "/HalfMoonBrowser_site"

# GitHub Pages 設定
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

# 全ページに default レイアウトを適用し、prev/next を自動で埋める
defaults:
  - scope:
      path: ""
    values:
      layout: default

# pretty URL (01-setup.md → /01-setup/) — index.md は自動的に / に配置される
permalink: pretty

# 除外 (GitHub Pages のビルド対象から外す)
exclude:
  - README.md          # GitHub 上のリポジトリ説明用、サイトには不要
  - Gemfile
  - Gemfile.lock
  - .jekyll-cache
  - vendor
  - _build_tools       # 内部スクリプト (変換ツールなど)
  - screenshots/README.md  # 撮影スタッフ用で公開しない
