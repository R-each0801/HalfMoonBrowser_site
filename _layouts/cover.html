<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#2B3A67" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#0F1320" media="(prefers-color-scheme: dark)">
  <title>{{ page.title | default: site.title }}</title>
  <link rel="stylesheet" href="{{ '/assets/css/halfmoon.css' | relative_url }}?v={{ site.time | date: '%s' }}">

</head>
<body class="hm-body-cover">
  <main class="hm-cover-wrap">
    {{ content }}
  </main>
</body>
</html>
